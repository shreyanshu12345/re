name: Compile LaTeX
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v3
        with:
          root_file: Main.tex
      - uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: Main.pdf